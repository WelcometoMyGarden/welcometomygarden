name: Deploy to Firebase Hosting on merge to beta
on:
  push:
    branches:
      - beta
    # Since this action only deploys the front-end SvelteKit SPA
    # backend resources can be ignored.
    paths-ignore:
      - .gitignore
      - playwright.config.ts
      # An updated backend shouldn't trigger deploys
      - api/**
      # We don't have automated Firestore rules deploys yet.
      - firestore*
      # Updated docs shouldn't trigger deploys
      - docs/**
      - "*.md"
      # We don't run front-end tests here yet
      - tests/**
      - ci/**
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    environment: beta
    env:
      VITE_FIREBASE_API_KEY: ${{secrets.FIREBASE_API_KEY}}
      VITE_FIREBASE_AUTH_DOMAIN: ${{secrets.FIREBASE_AUTH_DOMAIN}}
      VITE_FIREBASE_DATABASE_URL: ${{secrets.FIREBASE_DATABASE_URL}}
      VITE_FIREBASE_PROJECT_ID: ${{secrets.FIREBASE_PROJECT_ID}}
      VITE_FIREBASE_STORAGE_BUCKET: ${{secrets.FIREBASE_STORAGE_BUCKET}}
      VITE_FIREBASE_MESSAGING_SENDER_ID: ${{secrets.FIREBASE_MESSAGING_SENDER_ID}}
      VITE_FIREBASE_VAPID_PUBLIC_KEY: ${{vars.FIREBASE_VAPID_PUBLIC_KEY}}
      VITE_FIREBASE_APP_ID: ${{secrets.FIREBASE_APP_ID}}
      VITE_FIREBASE_MEASUREMENT_ID: ${{secrets.FIREBASE_MEASUREMENT_ID}}
      VITE_FIREBASE_APP_CHECK_PUBLIC_KEY: ${{vars.FIREBASE_APP_CHECK_PUBLIC_KEY}}
      VITE_MAPBOX_ACCESS_TOKEN: ${{secrets.MAPBOX_ACCESS_TOKEN}}
      VITE_THUNDERFOREST_API_KEY: ${{secrets.THUNDERFOREST_API_KEY}}
      VITE_DIRECT_TRAIN_API_URLS: ${{secrets.DIRECT_TRAIN_API_URLS}}
      VITE_DB_TRANSPORT_REST_API_URLS: ${{secrets.DB_TRANSPORT_REST_API_URLS}}
      VITE_STATIC_ASSETS_BUCKET: https://storage.googleapis.com/wtmg-static
      VITE_STRIPE_PUBLISHABLE_KEY: ${{secrets.STRIPE_PUBLISHABLE_KEY}}
      VITE_STRIPE_PRICE_ID_REDUCED: ${{secrets.STRIPE_PRICE_ID_REDUCED}}
      VITE_STRIPE_PRICE_ID_NORMAL: ${{secrets.STRIPE_PRICE_ID_NORMAL}}
      VITE_STRIPE_PRICE_ID_SOLIDARITY: ${{secrets.STRIPE_PRICE_ID_SOLIDARITY}}
      VITE_ROUTEPLANNER_HOST: ${{vars.ROUTEPLANNER_HOST}}
      SENTRY_AUTH_TOKEN: ${{secrets.SENTRY_AUTH_TOKEN}}
      VITE_DISCOURSE_HOST: ${{vars.DISCOURSE_HOST}}
      PUBLIC_SUPABASE_ANON_KEY: ${{vars.SUPABASE_ANON_KEY}}
      PUBLIC_SUPABASE_API_URL: ${{vars.SUPABASE_API_URL}}
      PUBLIC_SENTRY_DSN: ${{vars.SENTRY_DSN}}
      PUBLIC_WTMG_HOST: ${{vars.WTMG_HOST}}
      IS_PREVIEW: "false"
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/prepare-source
      - name: Build project
        run: yarn run build:prod
      # FirebaseExtended/action-hosting-deploy runs firebase-tools on the runner's
      # built-in node24 runtime (currently 24.17.0), which has a regression that breaks
      # the STS token exchange during auth (ERR_STREAM_PREMATURE_CLOSE).
      # See https://github.com/nodejs/node/issues/63989 — fixed in 24.18.0.
      # The action gives no way to pin its runtime, so we call firebase-tools directly
      # under a Node version we control instead.
      - name: Pin Node for deploy (workaround for nodejs/node#63989)
        uses: actions/setup-node@v6
        with:
          node-version: 24.18.0
      - name: Authenticate to Firebase
        run: |
          echo "$FIREBASE_SERVICE_ACCOUNT" > "$RUNNER_TEMP/firebase-service-account.json"
          echo "GOOGLE_APPLICATION_CREDENTIALS=$RUNNER_TEMP/firebase-service-account.json" >> "$GITHUB_ENV"
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_WTMG_PRODUCTION }}
      - name: Deploy to Firebase Hosting
        run: npx -y firebase-tools@latest deploy --only hosting:beta --project wtmg-production --non-interactive
